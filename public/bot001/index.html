<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MarkLuce Bot</title>
  <meta name="description" content="MarkLuce AI еҠ©жүӢ вҖ” LINE зҷ»е…ҘеҫҢеҚіеҸҜе°Қи©ұ" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%232563eb'/><text x='32' y='44' font-family='Arial,sans-serif' font-size='28' font-weight='bold' fill='white' text-anchor='middle'>B</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }

    /* Chat layout вҖ” full viewport */
    .chat-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    .chat-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(30,41,59,0.95); border-bottom: 1px solid rgba(59,130,246,0.2); backdrop-filter: blur(8px); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
    .chat-footer { flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.1); padding: 12px 16px; background: rgba(30,41,59,0.95); backdrop-filter: blur(8px); }

    /* Messages */
    .chat-msg { margin-bottom: 12px; display: flex; flex-direction: column; }
    .chat-msg.user { align-items: flex-end; }
    .chat-msg.bot { align-items: flex-start; }
    .chat-bubble { padding: 10px 14px; border-radius: 12px; max-width: 85%; font-size: 0.9rem; line-height: 1.7; word-break: break-word; }
    .chat-msg.user .chat-bubble { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; }
    .chat-msg.bot .chat-bubble { background: rgba(255,255,255,0.08); color: #e2e8f0; }

    /* Markdown */
    .md-prose p { margin-bottom: 0.5em; }
    .md-prose ul, .md-prose ol { margin-left: 1.25em; margin-bottom: 0.5em; }
    .md-prose ul { list-style: disc; }
    .md-prose ol { list-style: decimal; }
    .md-prose a { color: #60a5fa; text-decoration: underline; }
    .md-prose code { background: rgba(255,255,255,0.1); padding: 0.1em 0.3em; border-radius: 0.25em; font-size: 0.85em; }
    .md-prose blockquote { border-left: 3px solid rgba(255,255,255,0.2); padding-left: 0.75em; margin-left: 0; color: #cbd5e1; }
    .md-prose strong { color: #93c5fd; }
    .md-prose table { border-collapse: collapse; margin: 0.5em 0; width: 100%; font-size: 0.85em; }
    .md-prose table th, .md-prose table td { border: 1px solid rgba(59,130,246,0.25); padding: 6px 10px; text-align: left; }
    .md-prose table th { background: rgba(59,130,246,0.2); font-weight: 600; color: #93c5fd; }

    /* Suggest buttons */
    .suggest-btn { display: inline-block; margin: 3px 0; padding: 5px 10px; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.35); color: #bfdbfe; border-radius: 8px; font-size: 0.82rem; cursor: pointer; text-align: left; transition: background 0.15s; }
    .suggest-btn:hover { background: rgba(59,130,246,0.3); }

    /* TTS */
    .tts-btn { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; padding: 3px 10px; border-radius: 999px; font-size: 0.7rem; cursor: pointer; margin: 4px 0; display: inline-flex; align-items: center; gap: 4px; }
    .tts-btn:hover { background: rgba(59,130,246,0.25); }
    .tts-btn.loading { opacity: 0.6; cursor: wait; }
    .audio-player { display: flex; align-items: center; gap: 10px; margin: 6px 0; padding: 8px 12px; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); border-radius: 10px; width: 100%; }
    .audio-player .pp-btn { background: linear-gradient(135deg,#2563eb,#3b82f6); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; }
    .audio-player .seek { flex: 1 1 auto; min-width: 50px; -webkit-appearance: none; appearance: none; height: 6px; background: rgba(255,255,255,0.25); border-radius: 3px; outline: none; cursor: pointer; padding: 0; margin: 0; }
    .audio-player .seek::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #60a5fa; border-radius: 50%; cursor: pointer; margin-top: -4px; border: 2px solid #0f172a; }
    .audio-player .seek::-moz-range-thumb { width: 14px; height: 14px; background: #60a5fa; border-radius: 50%; cursor: pointer; border: 2px solid #0f172a; }
    .audio-player .time { font-size: 0.72rem; color: #cbd5e1; font-variant-numeric: tabular-nums; min-width: 34px; white-space: nowrap; flex-shrink: 0; }

    .typing-indicator { color: #94a3b8; font-size: 0.8rem; padding: 8px 0; font-style: italic; }
    .voice-selector { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 0.75rem; color: #94a3b8; }
    .voice-selector label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .voice-selector input[type="radio"] { accent-color: #3b82f6; }

    /* Login gate */
    .login-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; height: 100dvh; padding: 24px; text-align: center; }
  </style>
</head>
<body class="gradient-bg">

  <!-- Login gate вҖ” QR Code -->
  <div id="gate" class="login-gate">
    <div class="mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white text-3xl font-bold mb-4">B</div>
      <h1 class="text-2xl font-bold text-white">MarkLuce Bot</h1>
      <p class="text-slate-400 text-sm mt-1">AI еҠ©жүӢ вҖ” зҷ»е…ҘеҫҢеҚіеҸҜе°Қи©ұ</p>
    </div>
    <div class="bg-white/5 border border-blue-500/20 rounded-2xl p-8">
      <p class="text-slate-300 mb-4 font-semibold">дҪҝз”Ё LINE зҷ»е…Ҙ</p>
      <a id="qr-link" class="inline-block cursor-pointer">
        <canvas id="qr-canvas" class="mx-auto rounded-xl" style="width:200px;height:200px;"></canvas>
      </a>
      <p id="qr-hint-mobile" class="hidden text-sm text-blue-300 mt-4">рҹ‘Ҷ й»һж“Ҡ QR CodeпјҢз”Ё LINE й–Ӣе•ҹзҷ»е…Ҙ</p>
      <p id="qr-hint-desktop" class="hidden text-sm text-blue-300 mt-4">рҹ“ұ з”ЁжүӢж©ҹ LINE жҺғжҸҸ QR Code зҷ»е…Ҙ</p>
    </div>
  </div>

  <!-- Chat UI (hidden until logged in) -->
  <div id="app" class="chat-container hidden">
    <!-- Header -->
    <div class="chat-header">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold">B</div>
        <span class="text-sm font-semibold text-white">MarkLuce Bot</span>
      </div>
      <div class="flex items-center gap-3">
        <div id="user-info" class="flex items-center gap-2">
          <img id="user-avatar" class="w-7 h-7 rounded-full border border-blue-500/30" src="" alt="" />
          <span id="user-name" class="text-xs text-blue-300 max-w-[80px] truncate"></span>
        </div>
        <button id="logout-btn" class="text-xs text-slate-400 hover:text-red-400 transition">зҷ»еҮә</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg bot">
        <div class="chat-bubble-wrap">
          <div><button class="tts-btn tts-top" id="welcomeTtsTop">рҹ”Ҡ ж’ӯж”ҫ</button></div>
          <div class="chat-bubble md-prose" id="welcomeBubble">Hi! жҲ‘жҳҜ <strong>MarkLuce Bot</strong> рҹ‘Ӣ<br><br>жңүд»ҖйәјжҲ‘еҸҜд»Ҙе№«дҪ зҡ„е—Һпјҹ<br><br>и©Ұи©ҰзңӢпјҲй»һж“ҠеҚійҖҒпјүпјҡ<div id="suggestList"></div></div>
          <div><button class="tts-btn tts-bottom" id="welcomeTtsBottom">рҹ”Ҡ ж’ӯж”ҫ</button></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="chat-footer">
      <div class="voice-selector">
        <span>рҹ”Ҡ иӘһйҹі:</span>
        <label><input type="radio" name="voice" value="female" checked> еҘіиҒІ Ava</label>
        <label><input type="radio" name="voice" value="male"> з”·иҒІ Andrew</label>
      </div>
      <div class="flex gap-2">
        <input type="text" id="chatInput" class="flex-1 bg-white/5 border border-blue-500/30 rounded-lg px-4 py-2.5 text-white text-sm outline-none focus:border-blue-500 placeholder-slate-500" placeholder="ијёе…ҘиЁҠжҒҜ..." autocomplete="off" />
        <button id="chatSend" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed">йҖҒеҮә</button>
      </div>
    </div>
  </div>

<script>
// ----- Config -----
var LIFF_ID = '2009738746-2qigSpHh';
var CHAT_URL = '/api/bot001-chat';
var TTS_URL = 'https://dcjlekszmobaenhrdbfl.supabase.co/functions/v1/tts';
var TTS_KEY = 'sb_publishable_LoGKEHFftjjIf0G1Xv3ozA_A5nZeudW';

var currentUser = null;
var isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

// ----- QR Code Login -----
function generateQR() {
  var returnTo = window.location.pathname + window.location.search;
  var liffUrl = 'https://liff.line.me/' + LIFF_ID + '?returnTo=' + encodeURIComponent(returnTo);
  var canvas = document.getElementById('qr-canvas');
  var link = document.getElementById('qr-link');
  link.href = liffUrl;

  QRCode.toCanvas(canvas, liffUrl, {
    width: 400,
    margin: 2,
    color: { dark: '#2563eb', light: '#ffffff' }
  });

  if (isMobile) {
    document.getElementById('qr-hint-mobile').classList.remove('hidden');
  } else {
    document.getElementById('qr-hint-desktop').classList.remove('hidden');
  }
}

// ----- LIFF Login -----
async function initLiff() {
  if (!LIFF_ID || typeof liff === 'undefined') {
    generateQR();
    return;
  }
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      var profile = await liff.getProfile();
      currentUser = {
        userId: profile.userId,
        displayName: profile.displayName,
        pictureUrl: profile.pictureUrl || '',
      };
      showApp();
    } else {
      generateQR();
    }
  } catch (e) {
    console.error('LIFF init error:', e);
    generateQR();
  }
}

function showApp() {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('user-avatar').src = currentUser.pictureUrl;
  document.getElementById('user-name').textContent = currentUser.displayName;
  chatInput.focus();
}

document.getElementById('logout-btn').addEventListener('click', function() {
  if (typeof liff !== 'undefined' && liff.isLoggedIn()) liff.logout();
  window.location.reload();
});

// ----- Helpers -----
function renderMd(str) {
  if (!str) return '';
  return DOMPurify.sanitize(marked.parse(str));
}

function escHtml(str) {
  var d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function stripMarkdown(str) {
  return (str || '')
    .replace(/#{1,6}\s*/g, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/`(.+?)`/g, '$1')
    .replace(/\[(.+?)\]\(.+?\)/g, '$1');
}

// ----- Chatbot -----
var chatInput = document.getElementById('chatInput');
var chatSend = document.getElementById('chatSend');
var chatMessages = document.getElementById('chatMessages');

var ALL_TOPICS = [
  'дҪ еҸҜд»ҘеҒҡд»Җйәјпјҹ',
  'д»Ӣзҙ№дёҖдёӢ markluce.ai',
  'app.markluce.ai жңүе“Әдәӣз№Әжң¬пјҹ',
  'жҖҺйәјиЁӮй–ұпјҹ',
  'еҸҜд»Ҙйӣўз·ҡй–ұи®Җе—Һпјҹ'
];

function pickRandomTopics(n) {
  var shuffled = ALL_TOPICS.slice().sort(function() { return Math.random() - 0.5; });
  return shuffled.slice(0, n);
}

// Render suggestions
(function() {
  var picked = pickRandomTopics(5);
  var html = picked.map(function(t, i) {
    return '<button class="suggest-btn" data-q="' + t.replace(/"/g, '&quot;') + '">' + (i + 1) + '. ' + t + '</button>';
  }).join('<br>');
  var list = document.getElementById('suggestList');
  if (list) list.innerHTML = html;

  var welcomeText = 'Hi! жҲ‘жҳҜ MarkLuce BotгҖӮжҲ‘еүӣеүӣзөҰдәҶз”ЁжҲ¶д»ҘдёӢе»әиӯ°йҒёй …пјҡ\n' +
    picked.map(function(t, i) { return (i + 1) + '. ' + t; }).join('\n') +
    '\nиӢҘз”ЁжҲ¶еӣһзӯ”ж•ёеӯ— 1-5пјҢе°ҚжҮүйҖҷдәӣйЎҢзӣ®гҖӮ';
  window.WELCOME_SEED = welcomeText;
})();

var chatHistory = [{ role: 'assistant', content: window.WELCOME_SEED || '' }];
var chatSending = false;

chatInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !chatSending) sendChat();
});
chatSend.onclick = function() { if (!chatSending) sendChat(); };

// Clickable suggestion buttons
chatMessages.addEventListener('click', function(e) {
  var btn = e.target.closest('.suggest-btn');
  if (!btn || chatSending) return;
  chatInput.value = btn.dataset.q || btn.textContent;
  sendChat();
});

async function sendChat() {
  var msg = chatInput.value.trim();
  if (!msg || !currentUser) return;

  chatInput.value = '';
  chatSending = true;
  chatSend.disabled = true;
  appendChat('user', msg);
  chatHistory.push({ role: 'user', content: msg });

  var typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.textContent = 'Bot жҖқиҖғдёӯ...';
  chatMessages.appendChild(typing);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  try {
    var res = await fetch(CHAT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: msg,
        history: chatHistory.slice(-10),
        line_user_id: currentUser.userId,
        display_name: currentUser.displayName
      })
    });
    var data = await res.json();
    typing.remove();
    if (data.reply) {
      appendChat('bot', data.reply);
      chatHistory.push({ role: 'assistant', content: data.reply });
    } else {
      appendChat('bot', data.error || 'жҠұжӯүпјҢзӣ®еүҚз„Ўжі•еӣһжҮүпјҢи«ӢзЁҚеҫҢеҶҚи©ҰгҖӮ');
    }
  } catch (err) {
    typing.remove();
    appendChat('bot', 'йҖЈз·ҡйҢҜиӘӨпјҢи«ӢзЁҚеҫҢеҶҚи©ҰгҖӮ');
  }
  chatSending = false;
  chatSend.disabled = false;
}

function appendChat(role, text) {
  var div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  if (role === 'bot') {
    var ttsText = stripMarkdown(text);
    div.innerHTML = '<div class="chat-bubble-wrap">' +
      '<div><button class="tts-btn tts-top">рҹ”Ҡ ж’ӯж”ҫ</button></div>' +
      '<div class="chat-bubble md-prose">' + renderMd(text) + '</div>' +
      '<div><button class="tts-btn tts-bottom">рҹ”Ҡ ж’ӯж”ҫ</button></div>' +
      '</div>';
    var btns = div.querySelectorAll('.tts-btn');
    btns.forEach(function(b) {
      b.addEventListener('click', function() { loadAndPlay(b, ttsText, div); });
    });
  } else {
    div.innerHTML = '<div class="chat-bubble">' + escHtml(text) + '</div>';
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ----- TTS -----
var currentAudio = null;

async function loadAndPlay(btn, text, msgDiv) {
  var existingPlayer = msgDiv.querySelector('.audio-player');
  if (existingPlayer) {
    var audio = existingPlayer._audio;
    if (audio.paused) { audio.play(); } else { audio.pause(); }
    return;
  }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  var gender = document.querySelector('input[name="voice"]:checked').value;
  btn.classList.add('loading');
  btn.innerHTML = 'вҸі ијүе…Ҙдёӯ';
  try {
    var res = await fetch(TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TTS_KEY },
      body: JSON.stringify({ text: text, voice: gender })
    });
    if (!res.ok) throw new Error('TTS failed');
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    var audio = new Audio();
    audio.preload = 'auto';
    audio.src = url;
    currentAudio = audio;

    var player = document.createElement('div');
    player.className = 'audio-player';
    player._audio = audio;
    player.innerHTML =
      '<button class="pp-btn" title="ж’ӯж”ҫ/жҡ«еҒң">в–¶</button>' +
      '<span class="time cur">0:00</span>' +
      '<input type="range" min="0" max="1000" value="0" step="1" class="seek">' +
      '<span class="time dur">--:--</span>';

    var ppBtn = player.querySelector('.pp-btn');
    var seekBar = player.querySelector('.seek');
    var curTime = player.querySelector('.cur');
    var durTime = player.querySelector('.dur');

    function fmt(s) {
      if (!s || !isFinite(s)) return '--:--';
      var m = Math.floor(s / 60);
      return m + ':' + (Math.floor(s % 60) + '').padStart(2, '0');
    }
    function updateDuration() {
      if (audio.duration && isFinite(audio.duration)) durTime.textContent = fmt(audio.duration);
    }
    audio.addEventListener('loadedmetadata', updateDuration);
    audio.addEventListener('durationchange', updateDuration);
    audio.addEventListener('canplay', updateDuration);
    audio.addEventListener('timeupdate', function() {
      if (!seekBar._dragging && audio.duration && isFinite(audio.duration))
        seekBar.value = Math.floor(audio.currentTime / audio.duration * 1000);
      curTime.textContent = fmt(audio.currentTime);
      updateDuration();
    });
    audio.addEventListener('play', function() { ppBtn.innerHTML = 'вҸё'; });
    audio.addEventListener('pause', function() { ppBtn.innerHTML = 'в–¶'; });
    audio.addEventListener('ended', function() { ppBtn.innerHTML = 'в–¶'; seekBar.value = 0; curTime.textContent = '0:00'; });

    ppBtn.onclick = function() { audio.paused ? audio.play() : audio.pause(); };
    seekBar.addEventListener('mousedown', function() { seekBar._dragging = true; });
    seekBar.addEventListener('mouseup', function() { seekBar._dragging = false; });
    seekBar.addEventListener('touchstart', function() { seekBar._dragging = true; });
    seekBar.addEventListener('touchend', function() { seekBar._dragging = false; });
    seekBar.addEventListener('input', function() {
      if (audio.duration && isFinite(audio.duration))
        audio.currentTime = (seekBar.value / 1000) * audio.duration;
    });

    var bubble = msgDiv.querySelector('.chat-bubble');
    bubble.insertAdjacentElement('afterend', player);

    msgDiv.querySelectorAll('.tts-btn').forEach(function(b) {
      b.classList.remove('loading');
      b.innerHTML = 'рҹ”Ҡ ж’ӯж”ҫ';
    });
    audio.play();
  } catch (err) {
    btn.classList.remove('loading');
    btn.innerHTML = 'рҹ”Ҡ еӨұж•—';
    console.error('TTS error:', err);
  }
}

// Wire TTS on welcome message
(function() {
  var bubble = document.getElementById('welcomeBubble');
  if (!bubble) return;
  var text = stripMarkdown(bubble.innerText || bubble.textContent);
  var parent = bubble.closest('.chat-msg');
  document.getElementById('welcomeTtsTop').addEventListener('click', function() { loadAndPlay(this, text, parent); });
  document.getElementById('welcomeTtsBottom').addEventListener('click', function() { loadAndPlay(this, text, parent); });
})();

// ----- Init -----
initLiff();
</script>
</body>
</html>
