<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>付款結果 — Purchase Result</title>
  <style>
    :root { --amber: #f59e0b; --green: #10b981; --red: #ef4444; --gray-500: #6b7280; --gray-900: #111827; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif; background: #f9fafb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 16px; padding: 40px 32px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: var(--gray-900); margin-bottom: 8px; }
    p { font-size: 15px; color: var(--gray-500); line-height: 1.6; margin-bottom: 8px; }
    .details { background: #f3f4f6; border-radius: 8px; padding: 16px; margin: 16px 0; text-align: left; font-size: 13px; color: var(--gray-500); }
    .details div { margin-bottom: 4px; }
    .details strong { color: var(--gray-900); }
    .btn { display: inline-block; margin-top: 16px; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 15px; font-weight: 600; }
    .btn-primary { background: var(--amber); color: white; }
    .btn-secondary { background: white; color: var(--amber); border: 1px solid var(--amber); margin-left: 8px; }
  </style>
</head>
<body>
<div class="card" id="result">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">處理中...</h1>
  <p id="message">正在確認付款結果</p>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const rtnCode = params.get('RtnCode');
  const tradeNo = params.get('MerchantTradeNo') || '';
  const amount = params.get('TradeAmt') || '';
  const card = document.getElementById('result');

  if (rtnCode === '1') {
    document.getElementById('icon').textContent = '🎉';
    document.getElementById('title').textContent = '付款成功！';
    document.getElementById('title').style.color = '#10b981';
    document.getElementById('message').innerHTML = '繪本已加入你的書架，可以開始閱讀了！';
    card.innerHTML += `
      <div class="details">
        <div><strong>訂單編號：</strong>${tradeNo}</div>
        <div><strong>金額：</strong>NT$${amount}</div>
        <div><strong>電子發票：</strong>已自動開立，將寄送至您的 Email</div>
      </div>
      <a href="/app/" class="btn btn-primary">回到書架</a>
    `;
  } else {
    document.getElementById('icon').textContent = '😥';
    document.getElementById('title').textContent = '付款未完成';
    document.getElementById('title').style.color = '#ef4444';
    document.getElementById('message').textContent = params.get('RtnMsg') || '付款過程中發生問題，請稍後再試。';
    card.innerHTML += `
      <div class="details">
        <div><strong>訂單編號：</strong>${tradeNo}</div>
        <div><strong>狀態：</strong>${params.get('RtnMsg') || '未完成'}</div>
      </div>
      <a href="/app/" class="btn btn-primary">回到書架</a>
      <a href="/app/store.html" class="btn btn-secondary">再試一次</a>
    `;
  }
</script>
</body>
</html>
