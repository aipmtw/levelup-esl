<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Features | MarkLuce.ai</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Roboto,sans-serif;color:#212529;background:#fff;-webkit-font-smoothing:antialiased}
a{color:#0d6efd;text-decoration:none}
a:hover{color:#0a58ca;text-decoration:underline}
.container{max-width:780px;margin:0 auto;padding:0 1.5rem}

/* Nav */
nav{padding:.8rem 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e9ecef}
nav a{color:#6c757d;font-size:.85rem}
nav a:hover{color:#0d6efd;text-decoration:none}
.nav-right{display:flex;gap:1rem;align-items:center}

/* List view */
.list-header{padding:2rem 0 1rem}
.list-header h1{font-size:1.5rem;font-weight:700}
.list-header h1 span{color:#6f42c1}
.list-header p{font-size:.9rem;color:#6c757d;margin-top:.3rem}
.list{padding:.5rem 0 2rem}
.list-card{display:block;padding:1.2rem;margin-bottom:.75rem;border:1px solid #e9ecef;border-radius:10px;color:inherit;transition:all .15s}
.list-card:hover{border-color:#0d6efd;box-shadow:0 4px 12px rgba(13,110,253,.08);text-decoration:none;transform:translateY(-1px)}
.list-card h2{font-size:1.05rem;font-weight:600;margin-bottom:.3rem}
.list-card .meta{font-size:.8rem;color:#6c757d;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.list-card .tag{display:inline-block;font-size:.68rem;padding:.12rem .4rem;border-radius:3px;background:#e7f1ff;color:#0d6efd;font-weight:500}

/* Article view */
.article-page{display:none}
.article-page.active{display:block}
.list-page.hidden{display:none}
.article-header{padding:2rem 0 1.5rem;border-bottom:1px solid #e9ecef}
.article-header .date{font-size:.85rem;color:#0d6efd;font-weight:600;margin-bottom:.4rem}
.article-header h1{font-size:1.5rem;font-weight:700;line-height:1.4}
.article-header .tags{margin-top:.6rem;display:flex;gap:.4rem;flex-wrap:wrap}
.article-header .tag{font-size:.7rem;padding:.15rem .5rem;border-radius:4px;background:#e7f1ff;color:#0d6efd;font-weight:500}
.font-controls{display:flex;align-items:center;gap:.3rem;margin-top:.75rem}
.font-btn{background:#f8f9fa;border:1px solid #dee2e6;border-radius:5px;padding:.25rem .5rem;color:#495057;cursor:pointer;font-size:.75rem;font-weight:700}
.font-btn:hover{border-color:#0d6efd;color:#0d6efd}

/* Article body */
.article-body{padding:2rem 0 3rem;line-height:1.9;transition:font-size .2s}
.article-body h1{font-size:1.4rem;font-weight:700;margin:2rem 0 .75rem;color:#212529}
.article-body h2{font-size:1.2rem;font-weight:700;margin:1.8rem 0 .6rem;color:#212529;padding-bottom:.4rem;border-bottom:1px solid #e9ecef}
.article-body h3{font-size:1.05rem;font-weight:600;margin:1.5rem 0 .5rem;color:#212529}
.article-body p{margin:.75rem 0;color:#495057}
.article-body strong{color:#212529;font-weight:600}
.article-body a{color:#0d6efd}
.article-body ul,.article-body ol{margin:.75rem 0;padding-left:1.5rem;color:#495057}
.article-body li{margin:.3rem 0}
.article-body blockquote{border-left:3px solid #6f42c1;padding:.75rem 1rem;margin:1rem 0;background:#f8f9fa;border-radius:0 8px 8px 0;color:#6c757d;font-size:.92rem}
.article-body code{background:#f1f3f5;padding:.15rem .4rem;border-radius:4px;font-size:.88em;font-family:'SF Mono','Fira Code',monospace;color:#d63384}
.article-body pre{background:#212529;border-radius:8px;padding:1rem;overflow-x:auto;margin:1rem 0}
.article-body pre code{background:none;padding:0;color:#e9ecef}
.article-body table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.9rem}
.article-body th,.article-body td{padding:.6rem .75rem;border:1px solid #dee2e6;text-align:left}
.article-body th{background:#f8f9fa;color:#212529;font-weight:600;font-size:.82rem}
.article-body td{color:#495057}
.article-body hr{border:none;border-top:1px solid #e9ecef;margin:2rem 0}

.footer{padding:1.5rem 0;border-top:1px solid #e9ecef;text-align:center;font-size:.78rem;color:#adb5bd}
.footer a{color:#6c757d}
.loading{padding:3rem 0;text-align:center;color:#adb5bd}

@media(max-width:480px){.container{padding:0 1rem}.article-header h1{font-size:1.25rem}}
</style>
</head>
<body>
<div class="container">
<nav>
<a href="/">← MarkLuce.ai</a>
<div class="nav-right">
<a href="/daily-brief">Daily Brief</a>
<a href="/esl">ESL</a>
</div>
</nav>

<!-- LIST PAGE -->
<div class="list-page" id="listPage">
<div class="list-header">
<h1><span>&lt;/&gt;</span> Features</h1>
<p>AI 開發工具深度分析與專題文章</p>
</div>
<div class="list" id="featureList">
<div class="loading">載入中...</div>
</div>
</div>

<!-- ARTICLE PAGE -->
<div class="article-page" id="articlePage">
<div class="article-header">
<div class="date" id="artDate"></div>
<h1 id="artTitle"></h1>
<div class="tags" id="artTags"></div>
<div class="font-controls">
<button class="font-btn" onclick="changeFontSize(-1)">A-</button>
<button class="font-btn" id="fontLabel">16</button>
<button class="font-btn" onclick="changeFontSize(1)">A+</button>
</div>
</div>
<div class="article-body" id="artBody"></div>
</div>

<div class="footer">
由 <a href="https://markluce.ai/">MarkLuce.ai</a> 出品 · 與 Claude Opus 4.6 共同創作
</div>
</div>

<script>
let fontSize=16;

async function init(){
  const params=new URLSearchParams(location.search);
  const slug=params.get('slug');
  if(slug){loadArticle(slug);}
  else{loadList();}
}

async function loadList(){
  document.getElementById('listPage').classList.remove('hidden');
  document.getElementById('articlePage').classList.remove('active');
  const r=await fetch('/api/features');
  const data=await r.json();
  document.getElementById('featureList').innerHTML=data.map(f=>`
    <a class="list-card" href="?slug=${f.slug}" onclick="event.preventDefault();loadArticle('${f.slug}')">
      <h2>${f.title}</h2>
      <div class="meta">
        <span>${f.date}</span>
        ${(f.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </a>
  `).join('')||'<div class="loading">尚無文章</div>';
}

async function loadArticle(slug){
  document.getElementById('listPage').classList.add('hidden');
  document.getElementById('articlePage').classList.add('active');
  document.getElementById('artBody').innerHTML='<div class="loading">載入中...</div>';
  history.pushState(null,'','?slug='+slug);

  const r=await fetch('/api/features?slug='+slug);
  const d=await r.json();
  if(!d){
    document.getElementById('artBody').innerHTML='<div class="loading">文章不存在</div>';
    return;
  }
  document.getElementById('artDate').textContent=d.date;
  document.getElementById('artTitle').textContent=d.title;
  document.title=d.title+' | MarkLuce.ai';
  document.getElementById('artTags').innerHTML=(d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('artBody').innerHTML=marked.parse(d.content);
  applyFontSize();
  window.scrollTo({top:0,behavior:'smooth'});
}

function changeFontSize(delta){
  fontSize=Math.max(13,Math.min(24,fontSize+delta));
  document.getElementById('fontLabel').textContent=fontSize;
  applyFontSize();
  localStorage.setItem('feat-fontsize',fontSize);
}

function applyFontSize(){
  document.getElementById('artBody').style.fontSize=fontSize+'px';
}

window.addEventListener('popstate',()=>{
  const params=new URLSearchParams(location.search);
  const slug=params.get('slug');
  if(slug)loadArticle(slug);else loadList();
});

(function(){
  const s=localStorage.getItem('feat-fontsize');if(s)fontSize=parseInt(s);
  document.getElementById('fontLabel').textContent=fontSize;
})();

init();
</script>
</body>
</html>
