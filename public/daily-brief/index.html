<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dev Brief | MarkLuce.ai</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Roboto,sans-serif;color:#212529;background:#fff;-webkit-font-smoothing:antialiased}
a{color:#0d6efd;text-decoration:none}
a:hover{color:#0a58ca;text-decoration:underline}

.container{max-width:720px;margin:0 auto;padding:0 1.5rem}

/* Nav */
nav{padding:.8rem 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e9ecef}
nav a{color:#6c757d;font-size:.85rem}
nav a:hover{color:#0d6efd;text-decoration:none}
.nav-right{display:flex;gap:1rem;align-items:center}

/* Header */
.header{padding:2.5rem 0 1.5rem;border-bottom:1px solid #e9ecef;text-align:center}
.logo{font-size:1.5rem;font-weight:700;letter-spacing:-.03em;color:#212529}
.logo span{color:#0d6efd}
.tagline{font-size:.85rem;color:#6c757d;margin-top:.3rem}
.date-display{margin-top:.75rem;font-size:.9rem;color:#6c757d}
.date-display .day{color:#0d6efd;font-weight:600}

/* Headlines */
.headlines{padding:1.5rem 0}
.card{padding:1.25rem;margin-bottom:.75rem;border:1px solid #e9ecef;border-radius:10px;transition:all .15s}
.card:hover{border-color:#0d6efd;box-shadow:0 4px 12px rgba(13,110,253,.08)}
.card-top{display:flex;align-items:flex-start;gap:.75rem}
.card-num{flex-shrink:0;width:1.5rem;height:1.5rem;line-height:1.5rem;text-align:center;border-radius:50%;background:#e7f1ff;color:#0d6efd;font-size:.7rem;font-weight:600;margin-top:.15rem}
.card-content{flex:1;min-width:0}
.card h2{font-size:1rem;font-weight:600;line-height:1.5;color:#212529;margin-bottom:.4rem}
.card p{font-size:.88rem;color:#6c757d;line-height:1.7}
.card-meta{display:flex;align-items:center;gap:.5rem;margin-top:.6rem}
.tag{display:inline-block;font-size:.7rem;padding:.15rem .5rem;border-radius:3px;background:#e7f1ff;color:#0d6efd;font-weight:500}
.source-link{font-size:.75rem;color:#6c757d;text-decoration:none;transition:color .15s}
.source-link:hover{color:#0d6efd}

/* Archive */
.archive{padding:2rem 0 3rem}
.archive-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:#6c757d;margin-bottom:1rem;font-weight:600}
.archive-month{font-size:.8rem;color:#0d6efd;font-weight:600;margin-top:1.25rem;margin-bottom:.5rem}
.archive-item{display:block;padding:.5rem 0;text-decoration:none;color:#212529;font-size:.85rem;border-bottom:1px solid #e9ecef;transition:color .15s}
.archive-item:hover{color:#0d6efd;text-decoration:none}
.archive-item .a-date{font-family:'SF Mono',monospace;font-size:.78rem;color:#adb5bd;margin-right:.5rem}
.archive-item .a-titles{color:#6c757d;font-size:.8rem}

/* Footer */
.footer{padding:1.5rem 0;border-top:1px solid #e9ecef;text-align:center;font-size:.78rem;color:#adb5bd}
.footer a{color:#6c757d;text-decoration:none}
.footer a:hover{color:#0d6efd}

/* Empty & Loading */
.empty{padding:3rem 0;text-align:center;color:#adb5bd;font-size:.9rem}
.loading{padding:3rem 0;text-align:center;color:#adb5bd;font-size:.85rem}
.loading::after{content:'';display:inline-block;width:1rem;height:1rem;border:2px solid #dee2e6;border-top-color:#0d6efd;border-radius:50%;animation:spin .6s linear infinite;margin-left:.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){.container{padding:0 1rem}.header{padding:1.5rem 0 1rem}.logo{font-size:1.3rem}}
</style>
</head>
<body>
<div class="container">
<nav>
<a href="/">← MarkLuce.ai</a>
<div class="nav-right">
<a href="/features/">Features</a>
<a href="/esl/">ESL</a>
</div>
</nav>

<div class="header">
<div class="logo"><span>&gt;_</span> AI Dev Brief</div>
<div class="tagline">每日三則 AI 開發工具與程式設計生態快訊</div>
<div class="date-display" id="dateDisplay"></div>
</div>

<div class="headlines" id="headlines">
<div class="loading">載入中</div>
</div>

<div class="archive" id="archive">
<div class="archive-title">過往日報</div>
<div id="archiveList"></div>
</div>

<div class="footer">
由 <a href="https://markluce.ai/">MarkLuce.ai</a> 出品 · 與 Claude Opus 4.6 共同創作
</div>
</div>

<script>
const TAGS={'Anthropic':'Anthropic','Claude':'Anthropic','OpenAI':'OpenAI','Google':'Google','DeepMind':'Google','Meta':'Meta','Shopify':'Shopify','Perplexity':'Perplexity','Microsoft':'Microsoft','Cursor':'Cursor'};

function getTag(title,sourceName){
  for(const[k,v]of Object.entries(TAGS)){
    if(title.includes(k)||sourceName.includes(k))return v;
  }
  return sourceName||'';
}

function getTaipeiDate(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
}

function formatDate(dateStr){
  const days=['日','一','二','三','四','五','六'];
  const d=new Date(dateStr+'T00:00:00');
  const[y,m,dd]=dateStr.split('-');
  return{full:`${y} / ${m} / ${dd}（${days[d.getDay()]}）`,short:`${m}/${dd}`};
}

async function loadBrief(date){
  const url=date?`/api/brief?date=${date}`:'/api/brief';
  try{
    const r=await fetch(url);
    const d=await r.json();
    if(!d||!d.headlines){
      document.getElementById('headlines').innerHTML='<div class="empty">今日尚無速報，敬請期待</div>';
      const f=formatDate(date||getTaipeiDate().toISOString().split('T')[0]);
      document.getElementById('dateDisplay').innerHTML=`<span class="day">${f.full}</span>`;
      return;
    }
    const f=formatDate(d.date);
    document.getElementById('dateDisplay').innerHTML=`<span class="day">${f.full}</span>`;
    document.title=`AI Dev Brief ${f.full} | MarkLuce.ai`;

    document.getElementById('headlines').innerHTML=d.headlines.map((h,i)=>{
      const tag=getTag(h.title,h.source_name);
      return`<div class="card">
        <div class="card-top">
          <span class="card-num">${i+1}</span>
          <div class="card-content">
            <h2>${h.title}</h2>
            <p>${h.summary}</p>
            <div class="card-meta">
              ${tag?`<span class="tag">${tag}</span>`:''}
              ${h.source_url?`<a class="source-link" href="${h.source_url}" target="_blank" rel="noopener">${h.source_name||'Source'} ↗</a>`:''}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    document.getElementById('headlines').innerHTML='<div class="empty">載入失敗</div>';
  }
}

async function loadArchive(){
  try{
    const r=await fetch('/api/briefs?limit=90');
    const data=await r.json();
    let currentMonth='';
    document.getElementById('archiveList').innerHTML=data.map(b=>{
      const month=b.date.substring(0,7);
      const titles=b.headlines.map(h=>h.title.split('—')[0].trim()).join(' · ');
      const summary=titles.length>70?titles.substring(0,70)+'…':titles;
      let monthHeader='';
      if(month!==currentMonth){
        currentMonth=month;
        const[y,m]=month.split('-');
        monthHeader=`<div class="archive-month">${y} 年 ${parseInt(m)} 月</div>`;
      }
      return monthHeader+`<a class="archive-item" href="?date=${b.date}" onclick="event.preventDefault();loadBrief('${b.date}');window.scrollTo({top:0,behavior:'smooth'})">
        <span class="a-date">${b.date}</span>
        <span class="a-titles">${summary}</span>
      </a>`;
    }).join('');
  }catch(e){}
}

(function(){
  const params=new URLSearchParams(location.search);
  loadBrief(params.get('date')||null);
  loadArchive();
})();
</script>
</body>
</html>
