<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dev Brief | MarkLuce.ai</title>
<style>
:root{--bg:#09090b;--surface:#18181b;--surface2:#27272a;--text:#fafafa;--text2:#a1a1aa;--text3:#52525b;--accent:#22d3ee;--accent2:#a78bfa;--border:#27272a;--card-hover:#1f1f23;--tag-bg:rgba(34,211,238,.1);--tag-text:#22d3ee}
[data-theme="light"]{--bg:#fafafa;--surface:#fff;--surface2:#f4f4f5;--text:#18181b;--text2:#71717a;--text3:#a1a1aa;--accent:#0891b2;--accent2:#7c3aed;--border:#e4e4e7;--card-hover:#f4f4f5;--tag-bg:rgba(8,145,178,.08);--tag-text:#0891b2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Text','Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.container{max-width:680px;margin:0 auto;padding:0 1.25rem}

/* Nav */
nav{padding:1rem 0;display:flex;justify-content:space-between;align-items:center}
nav a{color:var(--text3);text-decoration:none;font-size:.8rem;letter-spacing:.02em}
nav a:hover{color:var(--accent)}
.nav-right{display:flex;gap:.75rem;align-items:center}
.theme-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:.2rem}
.theme-btn:hover{color:var(--accent)}

/* Header */
.header{padding:2.5rem 0 1.5rem;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.25rem}
.logo{font-size:1.5rem;font-weight:700;letter-spacing:-.03em}
.logo span{color:var(--accent)}
.tagline{font-size:.8rem;color:var(--text3);letter-spacing:.02em}
.date-display{margin-top:.75rem;font-size:.85rem;color:var(--text2)}
.date-display .day{color:var(--accent);font-weight:600}

/* Headlines */
.headlines{padding:1.5rem 0}
.card{padding:1.25rem 0;border-bottom:1px solid var(--border);transition:all .15s}
.card:last-child{border-bottom:none}
.card-top{display:flex;align-items:flex-start;gap:.75rem}
.card-num{flex-shrink:0;width:1.5rem;height:1.5rem;line-height:1.5rem;text-align:center;border-radius:50%;background:var(--surface2);color:var(--text2);font-size:.7rem;font-weight:600;margin-top:.15rem}
.card-content{flex:1;min-width:0}
.card h2{font-size:1rem;font-weight:600;line-height:1.5;letter-spacing:-.01em;margin-bottom:.4rem}
.card p{font-size:.88rem;color:var(--text2);line-height:1.7}
.card-meta{display:flex;align-items:center;gap:.5rem;margin-top:.6rem}
.tag{display:inline-block;font-size:.7rem;padding:.15rem .5rem;border-radius:4px;background:var(--tag-bg);color:var(--tag-text);font-weight:500;letter-spacing:.02em}
.source-link{font-size:.75rem;color:var(--text3);text-decoration:none;transition:color .15s}
.source-link:hover{color:var(--accent)}

/* Archive */
.archive{padding:2rem 0 3rem}
.archive-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:1rem}
.archive-month{font-size:.8rem;color:var(--accent);font-weight:600;margin-top:1.25rem;margin-bottom:.5rem}
.archive-item{display:block;padding:.5rem 0;text-decoration:none;color:var(--text);font-size:.85rem;border-bottom:1px solid var(--border);transition:color .15s}
.archive-item:hover{color:var(--accent)}
.archive-item .a-date{font-family:'SF Mono',monospace;font-size:.78rem;color:var(--text3);margin-right:.5rem}
.archive-item .a-titles{color:var(--text2);font-size:.8rem}

/* Footer */
.footer{padding:1.5rem 0;border-top:1px solid var(--border);text-align:center;font-size:.75rem;color:var(--text3)}
.footer a{color:var(--accent);text-decoration:none}

/* Empty state */
.empty{padding:3rem 0;text-align:center;color:var(--text3);font-size:.9rem}

/* Loading */
.loading{padding:3rem 0;text-align:center;color:var(--text3);font-size:.85rem}
.loading::after{content:'';display:inline-block;width:1rem;height:1rem;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-left:.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){.container{padding:0 1rem}.header{padding:1.5rem 0 1rem}.logo{font-size:1.3rem}}
</style>
</head>
<body>
<div class="container">
<nav>
<a href="/">MarkLuce.ai</a>
<div class="nav-right">
<a href="/esl">ESL</a>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9789;</button>
</div>
</nav>

<div class="header">
<div class="header-top">
<div class="logo"><span>&gt;_</span> AI Dev Brief</div>
</div>
<div class="tagline">每日三則 AI 開發工具與程式設計生態快訊</div>
<div class="date-display" id="dateDisplay"></div>
</div>

<div class="headlines" id="headlines">
<div class="loading">載入中</div>
</div>

<div class="archive" id="archive">
<div class="archive-title">過往日報</div>
<div id="archiveList"></div>
</div>

<div class="footer">
由 <a href="https://markluce.ai/">MarkLuce.ai</a> 出品 · 與 Claude Opus 4.6 共同創作
</div>
</div>

<script>
const TAGS={'Anthropic':'Anthropic','Claude':'Anthropic','OpenAI':'OpenAI','Google':'Google','DeepMind':'Google','Meta':'Meta','Shopify':'Shopify','Perplexity':'Perplexity','Microsoft':'Microsoft','Cursor':'Cursor'};

function getTag(title,sourceName){
  for(const[k,v]of Object.entries(TAGS)){
    if(title.includes(k)||sourceName.includes(k))return v;
  }
  return sourceName||'';
}

function getTaipeiDate(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
}

function formatDate(dateStr){
  const days=['日','一','二','三','四','五','六'];
  const d=new Date(dateStr+'T00:00:00');
  const[y,m,dd]=dateStr.split('-');
  return{full:`${y} / ${m} / ${dd}（${days[d.getDay()]}）`,short:`${m}/${dd}`};
}

async function loadBrief(date){
  const url=date?`/api/brief?date=${date}`:'/api/brief';
  try{
    const r=await fetch(url);
    const d=await r.json();
    if(!d||!d.headlines){
      document.getElementById('headlines').innerHTML='<div class="empty">今日尚無速報，敬請期待</div>';
      const f=formatDate(date||getTaipeiDate().toISOString().split('T')[0]);
      document.getElementById('dateDisplay').innerHTML=`<span class="day">${f.full}</span>`;
      return;
    }
    const f=formatDate(d.date);
    document.getElementById('dateDisplay').innerHTML=`<span class="day">${f.full}</span>`;
    document.title=`AI Dev Brief ${f.full} | MarkLuce.ai`;

    document.getElementById('headlines').innerHTML=d.headlines.map((h,i)=>{
      const tag=getTag(h.title,h.source_name);
      return`<div class="card">
        <div class="card-top">
          <span class="card-num">${i+1}</span>
          <div class="card-content">
            <h2>${h.title}</h2>
            <p>${h.summary}</p>
            <div class="card-meta">
              ${tag?`<span class="tag">${tag}</span>`:''}
              ${h.source_url?`<a class="source-link" href="${h.source_url}" target="_blank" rel="noopener">${h.source_name||'Source'} ↗</a>`:''}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    document.getElementById('headlines').innerHTML='<div class="empty">載入失敗</div>';
  }
}

async function loadArchive(){
  try{
    const r=await fetch('/api/briefs?limit=90');
    const data=await r.json();
    let currentMonth='';
    document.getElementById('archiveList').innerHTML=data.map(b=>{
      const month=b.date.substring(0,7);
      const titles=b.headlines.map(h=>h.title.split('—')[0].trim()).join(' · ');
      const summary=titles.length>70?titles.substring(0,70)+'…':titles;
      let monthHeader='';
      if(month!==currentMonth){
        currentMonth=month;
        const[y,m]=month.split('-');
        monthHeader=`<div class="archive-month">${y} 年 ${parseInt(m)} 月</div>`;
      }
      return monthHeader+`<a class="archive-item" href="?date=${b.date}" onclick="event.preventDefault();loadBrief('${b.date}');window.scrollTo({top:0,behavior:'smooth'})">
        <span class="a-date">${b.date}</span>
        <span class="a-titles">${summary}</span>
      </a>`;
    }).join('');
  }catch(e){}
}

function toggleTheme(){
  const h=document.documentElement;
  if(h.getAttribute('data-theme')==='light'){
    h.removeAttribute('data-theme');
    localStorage.setItem('brief-theme','dark');
  }else{
    h.setAttribute('data-theme','light');
    localStorage.setItem('brief-theme','light');
  }
}

(function(){
  if(localStorage.getItem('brief-theme')==='light')document.documentElement.setAttribute('data-theme','light');
  const params=new URLSearchParams(location.search);
  loadBrief(params.get('date')||null);
  loadArchive();
})();
</script>
</body>
</html>
